worker_processes  1;

# Standalone Nginx configuration
# This allows running Nginx without sudo/root by using local paths
pid        logs/nginx.pid;
error_log  logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Local temporary paths
    client_body_temp_path temp/client_body;
    proxy_temp_path temp/proxy;
    fastcgi_temp_path temp/fastcgi;
    uwsgi_temp_path temp/uwsgi;
    scgi_temp_path temp/scgi;

    access_log logs/access.log;

    sendfile        on;
    keepalive_timeout  3600; # 1 hour keep-alive
    send_timeout       36000; # 10 hours send timeout
    client_body_timeout 36000; # 10 hours client body timeout
    client_header_timeout 36000; # 10 hours client header timeout

    # Disable buffering for large uploads
    proxy_request_buffering off;
    proxy_buffering off;

    # Rate limiting to prevent brute force and DoS
    # Increased to support parallel chunked uploads
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # Allow large uploads
    client_max_body_size 100G;

    server {
        listen       80 default_server;
        server_name  _;

        # Increase proxy timeouts for large files (matching Gunicorn 36000s)
        proxy_read_timeout 36000;
        proxy_connect_timeout 36000;
        proxy_send_timeout 36000;

        # Landing page
        location = / {
            root /root/cs/static;
            index index.html;
        }

        # Dashboard
        location = /dashboard.html {
            root /root/cs/static;
        }

        # Admin Panel
        location = /admin.html {
            root /root/cs/static;
        }

        # Static files (images, css, js) - With Caching
        location /static/ {
            alias /root/cs/static/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /css/ {
            alias /root/cs/static/css/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /js/ {
            alias /root/cs/static/js/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # HLS Streaming
        location /hls/ {
            alias /root/cs/hls/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Optimized HLS delivery
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            
            # Allow Range requests for HLS chunks if needed
            add_header 'Accept-Ranges' 'bytes' always;

            expires -1;
            add_header Cache-Control "no-cache";
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            # Fallback to Flask if file not found (e.g., if alias fails)
            try_files $uri @flask_fallback;
        }

        location @flask_fallback {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Root and everything else goes to Flask
        location / {
            limit_req zone=api_limit burst=100 nodelay;
            
            # Global settings for large uploads to prevent timeouts and buffering
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Force large timeouts at the location level too
            proxy_read_timeout 36000s;
            proxy_connect_timeout 36000s;
            proxy_send_timeout 36000s;
            
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
