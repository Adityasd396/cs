worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting to prevent brute force and DoS
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Allow large uploads
    client_max_body_size 100G;

    server {
        listen       8080;
        server_name  localhost;

        # Increase proxy timeouts for large files
        proxy_read_timeout 3600;
        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;

        # Landing page
        location = / {
            root c:/cloud-storage/static;
            index index.html;
        }

        # Dashboard
        location = /dashboard.html {
            root c:/cloud-storage/static;
        }

        # Admin Panel
        location = /admin.html {
            root c:/cloud-storage/static;
        }

        # Static files (images, css, js) - With Caching
        location /static/ {
            alias c:/cloud-storage/static/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /css/ {
            alias c:/cloud-storage/static/css/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /js/ {
            alias c:/cloud-storage/static/js/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # HLS Streaming
        location /hls/ {
            alias c:/cloud-storage/hls/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            # Important for HLS seeking
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;

            # Caching for HLS segments (TS files)
            location ~* \.ts$ {
                expires 1h;
                add_header Cache-Control "public, no-transform";
            }

            # Playlists (m3u8) should not be cached long
            location ~* \.m3u8$ {
                expires -1;
                add_header Cache-Control "no-cache";
            }

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # Root and everything else goes to Flask
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
