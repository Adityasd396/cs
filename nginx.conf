worker_processes  1;

# Standalone Nginx configuration
# This allows running Nginx without sudo/root by using local paths
pid        logs/nginx.pid;
error_log  logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Local temporary paths
    client_body_temp_path temp/client_body;
    proxy_temp_path temp/proxy;
    fastcgi_temp_path temp/fastcgi;
    uwsgi_temp_path temp/uwsgi;
    scgi_temp_path temp/scgi;

    access_log logs/access.log;

    sendfile        on;
    keepalive_timeout  3600; # 1 hour keep-alive
    send_timeout       36000; # 10 hours send timeout
    client_body_timeout 36000; # 10 hours client body timeout
    client_header_timeout 36000; # 10 hours client header timeout

    # Disable buffering for large uploads
    proxy_request_buffering off;
    proxy_buffering off;

    # Rate limiting to prevent brute force and DoS
    # Increased to support parallel chunked uploads
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # Allow large uploads
    client_max_body_size 100G;

    server {
        listen       8080;
        server_name  localhost;

        # Increase proxy timeouts for large files (matching Gunicorn 36000s)
        proxy_read_timeout 36000;
        proxy_connect_timeout 36000;
        proxy_send_timeout 36000;

        # Landing page
        location = / {
            root static;
            index index.html;
        }

        # Dashboard
        location = /dashboard.html {
            root static;
        }

        # Admin Panel
        location = /admin.html {
            root static;
        }

        # Static files (images, css, js) - With Caching
        location /static/ {
            alias static/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /css/ {
            alias static/css/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        location /js/ {
            alias static/js/;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # HLS Streaming
        location /hls/ {
            alias /cloud-storage/hls/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Optimized HLS delivery
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            aio on;
            directio 512;

            expires -1;
            add_header Cache-Control "no-cache";
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # Root and everything else goes to Flask
        location / {
            limit_req zone=api_limit burst=100 nodelay;
            
            # Global settings for large uploads to prevent timeouts and buffering
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Force large timeouts at the location level too
            proxy_read_timeout 36000s;
            proxy_connect_timeout 36000s;
            proxy_send_timeout 36000s;
            
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
